<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Judging Form</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="js/form.js"></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">Music Judging</a>
      <nav aria-label="Pages">
        <a href="form.html" aria-current="page">Form</a>
        <a href="sheet.html">Sheet</a>
      </nav>
    </header>

    <main class="page-wrap narrow">
      <section class="form-card">
        <div class="form-head">
          <p class="eyebrow">Submission form</p>
          <h1>Judging Form</h1>
          <p>Song link or audio upload is required. You can include both.</p>
          <div id="firebase-status" class="firebase-status">Connecting to Firebase Realtime Database...</div>
        </div>

        <form id="submission-form" novalidate>
          <label class="field">
            <span>Who is submitting this song?</span>
            <textarea id="submitter" name="submitter" rows="3" required placeholder="Name, artist name, or all collaborators"></textarea>
          </label>

          <label class="field">
            <span>Song name</span>
            <input id="song-name" name="songName" type="text" required placeholder="What is the song called?">
          </label>

          <label class="field">
            <span>Link to song <small>optional</small></span>
            <input id="song-link" name="songLink" type="url" maxlength="100" placeholder="https://">
            <small class="hint">Links must be 100 characters or fewer. Please shorten long links before submitting.</small>
          </label>

          <label class="field file-field">
            <span>Import song file as Base64 <small>optional</small></span>
            <input id="song-file" name="songFile" type="file" accept="audio/*,.mp3,.wav,.m4a,.ogg,.flac">
            <small class="hint">Maximum file size is 30 MB. MP3 is preferred so playback works smoothly for everyone.</small>
          </label>

          <div id="file-preview" class="file-preview" hidden></div>
          <p id="form-message" class="message" role="status" aria-live="polite"></p>

          <div class="button-row">
            <button class="primary-btn" type="submit">Submit Song</button>
            <a class="secondary-btn" href="sheet.html">View Sheet</a>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Judging Sheet</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="js/admin.js"></script>
  </head>
  <body>
    <header class="topbar">
      <span class="brand">Music Judging Admin</span>
    </header>

    <main class="page-wrap">
      <section class="sheet-head">
        <div>
          <p class="eyebrow">Admin sheet</p>
          <h1>Judge Submissions</h1>
          <div id="firebase-status" class="firebase-status">Connecting to Firebase Realtime Database...</div>
        </div>
      </section>

      <section class="table-frame" aria-live="polite">
        <div id="admin-status" class="sheet-status">Loading submissions...</div>
        <div class="table-scroll">
          <table id="admin-table" class="admin-table">
            <thead>
              <tr>
                <th>Timestamp</th>
                <th>Submitter</th>
                <th>Song Link</th>
                <th>File</th>
                <th>Score</th>
                <th>Judging Description</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>

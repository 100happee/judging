<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Public Sheet</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="js/sheet.js"></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html">Music Judging</a>
      <nav aria-label="Pages">
        <a href="form.html">Form</a>
        <a href="sheet.html" aria-current="page">Sheet</a>
      </nav>
    </header>

    <main class="page-wrap">
      <section class="sheet-head">
        <div>
          <p class="eyebrow">Public sheet</p>
          <h1>Submissions</h1>
          <div id="firebase-status" class="firebase-status">Connecting to Firebase Realtime Database...</div>
        </div>
        <a class="primary-btn compact" href="form.html">New Submission</a>
      </section>

      <section class="table-frame" aria-live="polite">
        <div id="sheet-status" class="sheet-status">Loading submissions...</div>
        <div class="table-scroll">
          <table id="submissions-table">
            <thead>
              <tr>
                <th>Timestamp</th>
                <th>Submitter</th>
                <th>Song Link</th>
                <th>File</th>
                <th>Score</th>
                <th>Judging Description</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
